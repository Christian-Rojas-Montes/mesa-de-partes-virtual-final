<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#8a0808">
    <title>Sin conexión | Mesa de Partes Virtual</title>
    <style>
        :root { color-scheme: light; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
        * { box-sizing: border-box; }
        body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 1.25rem; color: #252525; background: #f5f6f8; }
        main { width: 100%; max-width: 38rem; padding: clamp(1.5rem, 5vw, 3rem); text-align: center; background: #fff; border-top: 6px solid #d4a017; border-radius: .8rem; box-shadow: 0 1rem 2.5rem rgb(101 6 6 / 12%); }
        .mark { display: inline-block; width: 4rem; height: 4rem; object-fit: contain; background: #fff; border-radius: 50%; }
        h1 { color: #650606; font-size: clamp(1.7rem, 6vw, 2.4rem); }
        p { line-height: 1.65; }
        button { min-height: 2.75rem; padding: .65rem 1rem; color: #fff; font: inherit; font-weight: 700; background: #8a0808; border: 0; border-radius: .45rem; cursor: pointer; }
        button:focus-visible { outline: 3px solid #ffbf47; outline-offset: 3px; }
    </style>
</head>
<body>
<main>
    <img class="mark" src="/images/logo-pedro-p-diaz.jpg" alt="Logotipo del IESTP Pedro P. Díaz">
    <h1>Sin conexión a Internet</h1>
    <p>No es posible registrar solicitudes, procesar trámites, consultar expedientes privados ni descargar documentos sin conexión.</p>
    <p>Verifica tu acceso a Internet y vuelve a intentarlo. Ningún documento será almacenado para enviarse posteriormente.</p>
    <button type="button" onclick="window.location.reload()">Volver a intentar</button>
</main>
</body>
</html>
